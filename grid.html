<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <div class="container-main">
      <div class="container-input">
        <input type="number" />
      </div>
      <div class="container-calculator">
        <section class="top-content">
          <button>(</button><button>)</button><button>%</button
          ><button>AC</button><button class="number">7</button
          ><button class="number">8</button><button class="number">9</button
          ><button>:</button><button class="number">4</button
          ><button class="number">5</button><button class="number">6</button
          ><button>x</button><button class="number">1</button
          ><button class="number">2</button><button class="number">3</button
          ><button>-</button><button>0</button><button>.</button
          ><button class="calculate">=</button><button>+</button>
        </section>
        <section class="bottom-content">
          <button class="unit">
            <span>Deg </span><span>|</span> <span> Rad</span></button
          ><button>x!</button><button>Inv</button><button>sin</button
          ><button>ln</button><button>π</button><button>cos</button
          ><button>log</button><button>e</button><button>tan</button
          ><button>√</button><button>Ans</button><button>EXP</button
          ><button>x<sup>y</sup></button>
        </section>
      </div>
    </div>
  </body>
</html>
